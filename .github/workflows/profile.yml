name: Refresh profile card

on:
  schedule:
    - cron: "30 2 * * *"   # daily, 07:30 PKT
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - generate_profile.py
      - portrait.txt

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_profile.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark.svg light.svg
          git diff --cached --quiet || git commit -m "chore: refresh profile card"
          git push
